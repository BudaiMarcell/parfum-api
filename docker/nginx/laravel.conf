# Laravel public-front virtual host. The nginx container has read-only
# access to the same /var/www tree as the api container (via the named
# volume in docker-compose) and forwards PHP execution to the api FPM
# pool over TCP.

server {
    # Listen on every interface inside the container; Traefik (or the
    # nginx-api compose service) is what actually publishes us to the host.
    listen 80;
    listen [::]:80;
    server_name _;

    # All Laravel apps serve from /public — index.php is the front controller.
    root /var/www/public;
    index index.php;

    # Don't echo the nginx version in error pages or response headers.
    server_tokens off;

    # Reasonable client body cap matching php.ini's post_max_size in app.ini.
    # Anything larger gets rejected by nginx before reaching PHP.
    client_max_body_size 10M;

    # Hide hidden files and the version-controlled metadata directories.
    # `.git`, `.env` etc. should never have leaked into the image, but defense
    # in depth is cheap.
    location ~ /\. {
        deny all;
    }

    # Static assets ship straight from disk — never round-trip through PHP.
    # Any URL nginx can't resolve to a file on disk falls through to /index.php
    # so Laravel's router sees it.
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Front-controller execution. Everything matching *.php (which after the
    # rewrite above is effectively just /index.php) is dispatched to the
    # FastCGI pool on the api service over the docker-compose backend network.
    location ~ \.php$ {
        # Resolve the .php to a real file so we don't accidentally send a
        # forged request to PHP.
        try_files $uri =404;

        # `api` is the docker-compose service name of the php-fpm container;
        # 9000 is its FPM listener (EXPOSE 9000 in the Dockerfile).
        fastcgi_pass api:9000;

        fastcgi_index index.php;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;

        # Standard FPM passthrough headers.
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Long enough for the heaviest admin endpoints (analytics aggregations)
        # without wedging if PHP hangs.
        fastcgi_read_timeout 30s;
        fastcgi_send_timeout 30s;

        # Buffer the upstream response so we don't drip-feed clients on a
        # slow PHP response.
        fastcgi_buffer_size 16k;
        fastcgi_buffers 8 16k;
    }

    # Lightweight HTTP-level cache for the immutable build artifacts Laravel
    # serves (images, fonts). The API's /api/* routes always 200 with no
    # caching headers, which is what we want.
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        try_files $uri =404;
    }
}
